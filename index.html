<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Fast Escape, Slow Convergence — interactive</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,600;8..60,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f7f4ec;
  --paper: #fbf9f3;
  --ink: #1a1a1f;
  --muted: #6a665d;
  --rule: #d9d3c2;
  --primary: #4c2db3;
  --primary-soft: #ede8fb;
  --accent: #c8632b;
  --tail: #9a4419;
  --good: #2e7a48;
  --serif: 'Source Serif 4', 'Iowan Old Style', 'Charter', Georgia, serif;
  --mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
}
* { box-sizing: border-box; }
html, body { background: var(--bg); color: var(--ink); }
body {
  margin: 0;
  font-family: var(--serif);
  font-size: 18px;
  line-height: 1.65;
  font-feature-settings: "onum", "pnum";
  -webkit-font-smoothing: antialiased;
}
.container {
  max-width: 760px;
  margin: 0 auto;
  padding: 4rem 1.5rem 6rem;
}
header.masthead {
  border-bottom: 1px solid var(--rule);
  padding-bottom: 1.8rem;
  margin-bottom: 3rem;
}
h1 {
  font-size: 2.6rem;
  line-height: 1.1;
  margin: 0 0 0.4rem;
  font-weight: 700;
  letter-spacing: -0.015em;
}
.byline {
  margin: 0.8rem 0 0;
  font-family: var(--mono);
  font-size: 0.78rem;
  color: var(--muted);
  letter-spacing: 0.01em;
}
.byline a { color: var(--muted); text-decoration: none; border-bottom: 1px solid var(--rule); }
.byline a:hover { color: var(--primary); border-color: var(--primary); }
section { margin: 3.5rem 0; }
section > h2 {
  font-size: 1.45rem;
  font-weight: 600;
  margin: 0 0 1.2rem;
  letter-spacing: -0.005em;
}
section > h2 .num {
  color: var(--muted);
  font-family: var(--mono);
  font-weight: 400;
  margin-right: 0.6em;
  font-size: 0.85em;
}
p { margin: 0 0 1.05rem; }
.lede { font-size: 1.12rem; line-height: 1.55; }
.muted { color: var(--muted); }
em { font-style: italic; }
strong { font-weight: 600; }
.mono, code, .num { font-family: var(--mono); }
</style>
</head>
<body>
<div class="container">
  <header class="masthead">
    <h1>Fast Escape, Slow Convergence</h1>
    <p class="byline">After Braun, Loureiro, Minh, Imaizumi · arXiv:<a href="https://arxiv.org/abs/2511.18661">2511.18661</a></p>
  </header>

  <main id="main"></main>
</div>
</body>
</html>
